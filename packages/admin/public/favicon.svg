<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- The Knit platform brandmark (interlocking curves, see src/icons.tsx KnitLogo), on a brand-blue
       tile so it reads on both light and dark browser tabs. -->
  <defs>
    <linearGradient id="knit" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4f6bed" />
      <stop offset="1" stop-color="#3f59d8" />
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#knit)" />
  <g
    transform="translate(4 4)"
    fill="none"
    stroke="#ffffff"
    stroke-width="2.2"
    stroke-linecap="round"
    stroke-linejoin="round"
  >
    <path d="M4 8c4 0 4 8 8 8s4-8 8-8" />
    <path d="M4 16c4 0 4-8 8-8s4 8 8 8" opacity="0.5" />
  </g>
</svg>
