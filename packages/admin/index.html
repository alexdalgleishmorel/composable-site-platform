<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Tab icon: the Knit platform brandmark (src/icons.tsx KnitLogo). -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Knit · platform editor</title>
    <!-- Set the theme before first paint to avoid a flash (README §Theme application). -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('knit-theme');
          var dark =
            stored === 'dark' ||
            (stored !== 'light' &&
              window.matchMedia &&
              window.matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
          var density = localStorage.getItem('knit-density');
          var scale = { compact: 0.86, regular: 1, comfy: 1.18 }[density] || 1;
          document.documentElement.style.setProperty('--density', String(scale));
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
