name: Deploy shared backend

on:
  push:
    branches: [main]
    paths:
      - 'infra/shared/**'
      - 'services/api/**'
      - 'packages/blocks/**'
      - 'packages/core/**'
  workflow_dispatch:

permissions:
  id-token: write # assume the deploy role via OIDC
  contents: read

concurrency: deploy-shared

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production # gated; holds the role ARN + Google secrets
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Bundle Lambda (React-free)
        run: pnpm --filter @csp/api bundle

      - name: Assume AWS deploy role (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@v4
      - name: Terraform apply
        id: tf
        working-directory: infra/shared
        env:
          TF_VAR_google_client_id: ${{ secrets.GOOGLE_CLIENT_ID }}
          TF_VAR_google_client_secret: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          # Cognito hosted-domain prefix is globally unique; set COGNITO_DOMAIN_PREFIX to an
          # account-unique value so the Google redirect URI is deterministic. Falls back to csp-auth.
          TF_VAR_cognito_domain_prefix: ${{ vars.COGNITO_DOMAIN_PREFIX || 'csp-auth' }}
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="dynamodb_table=${{ vars.TF_LOCK_TABLE }}" \
            -backend-config="region=us-east-1"
          terraform apply -auto-approve
          {
            echo "api_base_url=$(terraform output -raw api_base_url)"
            echo "user_pool_id=$(terraform output -raw user_pool_id)"
            echo "client_id=$(terraform output -raw user_pool_client_id)"
            echo "admin_bucket=$(terraform output -raw admin_bucket)"
            echo "admin_distribution=$(terraform output -raw admin_distribution_id)"
            echo "admin_url=$(terraform output -raw admin_url)"
          } >> "$GITHUB_OUTPUT"

      - name: Build and deploy the shared admin app
        env:
          VITE_API_BASE_URL: ${{ steps.tf.outputs.api_base_url }}
          VITE_COGNITO_AUTHORITY: https://cognito-idp.us-east-1.amazonaws.com/${{ steps.tf.outputs.user_pool_id }}
          VITE_COGNITO_CLIENT_ID: ${{ steps.tf.outputs.client_id }}
        run: |
          pnpm --filter @csp/admin build
          aws s3 sync packages/admin/dist "s3://${{ steps.tf.outputs.admin_bucket }}" --delete
          aws cloudfront create-invalidation --distribution-id "${{ steps.tf.outputs.admin_distribution }}" --paths "/*"
          echo "### Shared admin: ${{ steps.tf.outputs.admin_url }}" >> "$GITHUB_STEP_SUMMARY"
